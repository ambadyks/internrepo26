name: Deploy Preview on Pull Request

on:
  pull_request:
    paths:
      - "gesture_detect_app/**"

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:

  build_and_preview:

    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gesture_detect_app

    steps:

      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GESTUREDETECTAI }}
          projectId: gesturedetectai
