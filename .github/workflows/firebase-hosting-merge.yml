name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
    paths:
      - "gesture_detect_app/**"

jobs:
  build_and_deploy:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gesture_detect_app

    steps:

      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GESTUREDETECTAI }}
          channelId: live
          projectId: gesturedetectai